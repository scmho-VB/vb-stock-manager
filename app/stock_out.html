{% extends "base.html" %}
{% block content %}
<h1>Stock Out</h1>
<div class="card">
<form method="POST">
    <label>Product</label>
    <select name="product_id" required>
        <option value="">-- Select Product --</option>
        {% for p in products %}
        <option value="{{ p.id }}">{{ p.name }} ({{ p.sku }}) — Current: {{ p.quantity }}</option>
        {% endfor %}
    </select>

    <label>Quantity to Remove</label>
    <input type="number" name="quantity" min="1" required>

    <label>Reference (Store/STO No.)</label>
    <input type="text" name="reference">

    <label>Note</label>
    <input type="text" name="note">

    <br><br>
    <button type="submit" class="btn">Record Stock Out</button>
</form>
</div>
{% endblock %}
